<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pie Chart Example</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <style>
    .chart-container {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 40px;
    }
    canvas {
      max-width: 400px;
      max-height: 400px;
    }
  </style>
</head>
<body>

    <div class="chart-container">
        <canvas id="myPieChart" width="100" height="100"></canvas>
        <canvas id="myPieChart2" width="100" height="100"></canvas> 
    </div>


  <script>
    const ctx = document.getElementById('myPieChart').getContext('2d');
    new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Red', 'Blue', 'Yellow'],
        datasets: [{
          label: 'Έσοδα',
          data: getCtxData(),
          backgroundColor: [
            'rgb(255, 99, 132)',
            'rgb(54, 162, 235)',
            'rgb(255, 205, 86)'
          ],
          hoverOffset: 4
        }]
      }
    });
    // ctx.data.labels = ['January', 'February', 'March', 'April', 'May', 'June', 'July'];
    // ctx.data.datasets.label = 'Esoda 2025';
    // ctx.data.datasets.data  = [65, 59, 80, 81, 56, 55, 40];
    // ctx.update(); 
    

    const ctx2 = document.getElementById('myPieChart2').getContext('2d');
    new Chart(ctx2, {
      type: 'pie',
      data: {
        labels: ['Red', 'Blue', 'Yellow'],
        datasets: [{
          label: 'Έξοδα',
          data: [100, 150, 30],
          backgroundColor: [
            'rgb(255, 99, 132)',
            'rgb(54, 162, 235)',
            'rgb(255, 205, 86)'
          ],
          hoverOffset: 4
        }]
      }
    });
    // ctx2.update();

 
    function getCtxData() {
      // Simulate fetching data from a database or API
      return [100, 100, 100];
    }   



  </script>
</body>
</html>
