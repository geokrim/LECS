  <body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="br-logo">

        <i class="fa fa-angle-left"></i>
      </div>
      <a href=""><span>[</span>LECS<span>]</span></a>
    </div>

    <div class="br-sideleft">
      <div class="br-sideleft-top">
        <label class="sidebar-label pd-x-15 mg-t-20">Navigation</label>
      </div>

      <div class="br-sideleft-scroll">
        <div class="br-sideleft-menu" id="lc_menu"></div>
      </div>

      <div class="br-sideleft-bottom">
        <div class="lc-installation-info" id="lc_installation_info">
          <div class="lc-installation-row">
            <span class="lc-installation-label">ΕΓΚΑΤΑΣΤΑΣΗ</span>
            <span class="lc-installation-value" id="lc_installation_name">
              2199 [L] - DEV LS2
            </span>
          </div>
          <div class="lc-installation-row">
            <span class="lc-installation-label">ΗΜΕΡ. ΛΗΞΗΣ ΣΥΜΒΑΣΗΣ</span>
            <span class="lc-installation-value" id="lc_installation_expire">
              27/07/2026
            </span>
          </div>
        </div>

        <div class="lc-userbar" id="lc_userbar">
          <div
            class="lc-userbar__avatar"
            id="lc_user_avatar"
            aria-hidden="true"
          >
            <i class="fa fa-user"></i>
            <span class="lc-userbar__status" aria-hidden="true"></span>
          </div>
          <div class="lc-userbar__name" id="lc_user_name"></div>
        </div>
      </div>
    </div>

    <div class="br-mainpanel act_tab_new_mainpanel">
      <main class="br-pagebody">
        <h1 id="cus_name" class="page-title page-title--inbody">Ιστορικό</h1>
        <div id="progress_line" style="visibility: hidden"></div>

        <div class="content-card">
          <div class="content-card__body">
            <div class="table-shell">
              <table
                id="cusHistory"
                class="lc-table display responsive nowrap stripe"
              >
                <thead>
                  <tr>
                    <th>Ημερ/νία</th>
                    <th>Τύπος</th>
                    <th>Περιγραφή</th>
                    <th>Συνεργάτης</th>
                    <th>Αξία</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
      <footer class="br-footer">
        <div class="footer-left">
          <div class="mg-b-2">Copyright &copy; 2017. Bracket Plus.</div>
          <div>All Rights Reserved.</div>
        </div>
        <div class="footer-right d-flex align-items-center">
          <span class="tx-uppercase mg-r-10">Share:</span>
          <a target="_blank" class="pd-x-5" href="https://www.facebook.com/"><i class="fa fa-facebook-official"></i></a>
          <a target="_blank" class="pd-x-5" href="https://twitter.com/"><i class="fa fa-twitter"></i></a>
        </div>
      </footer>

    <script src="../lib/jquery/jquery.js"></script>
    <script src="../lib/popper.js/popper.js"></script>
    <script src="../lib/bootstrap/bootstrap.js"></script>
    <script src="../lib/jquery-ui/jquery-ui.js"></script>

    <script src="../lib/datatables/jquery.dataTables.js"></script>
    <script src="../lib/datatables-responsive/dataTables.responsive.js"></script>

    <script src="https://cdn.datatables.net/buttons/1.6.5/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.flash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.print.min.js"></script>

    <script>
      credsAppOtherCheck();

      if (typeof menu_constructor === "function") menu_constructor();

      document.addEventListener("click", function (e) {
        var link = e.target.closest(".br-menu-link");
        if (!link) return;

        var sub = link.nextElementSibling;
        if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
          e.preventDefault();
          link.classList.toggle("show-sub");
          return;
        }
      });

      (function () {
        try {
          var raw = localStorage.getItem("lcObj");
          if (!raw) return;
          var u = JSON.parse(raw);
          var name = (
            u && (u.name || u.username) ? String(u.name || u.username) : ""
          ).trim();
          var surname = (u && u.surname ? String(u.surname) : "").trim();
          var full = (name + (surname ? " " + surname : "")).trim();
          if (!full) return;
          var el = document.getElementById("lc_user_name");
          if (el) el.textContent = full;
        } catch (e) {}
      })();

      try {
        document.getElementById("lcCusMenu").classList.add("active");
        document.getElementById("lcCusMenu").classList.add("show-sub");
        document.getElementById("lcCus").classList.add("active");
      } catch (e) {}

      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      const cus_id = urlParams.get("id");
      var name = urlParams.get("name");
      document.getElementById("cus_name").innerHTML = "ΙΣΤΟΡΙΚΟ " + name;

      $("#cus_vafi_new_datepicker").datepicker({
        modal: true,
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
        autoHide: true,
        zIndex: 22222300000,
      });
      $("#cus_vafi_update_datepicker").datepicker({
        modal: true,
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
        autoHide: true,
        zIndex: 22222300000,
      });

      $("#cusHistory").DataTable({
        searching: false,
        responsive: true,
        stateSave: true,
        buttons: [
          { extend: "copy", className: "buttonsToHide" },
          { extend: "excel", className: "buttonsToHide" },
          { extend: "pdf", className: "buttonsToHide" },
          { extend: "print", className: "buttonsToHide" },
        ],
        columnDefs: [
          { width: "10%", targets: 0 },
          { width: "10%", targets: 1 },
          { width: "50%", targets: 2 },
          { width: "20%", targets: 3 },
          { width: "10%", targets: 4 },
        ],
        language: {
          searchPlaceholder: "Search...",
          sSearch: "",
          lengthMenu: "_MENU_ items/page",
        },
      });

      if (seeExport == 0) {
        var tblDT = $("#cusHistory").DataTable();
        tblDT.button(0).enable(false);
        tblDT.button(1).enable(false);
        tblDT.button(2).enable(false);
        tblDT.button(3).enable(false);
      }

      if (seeCusVafi == 0) {
        window.location.replace("active_tabs.html" + "?pid=" + generateRandomToken());
      }

      executeCusHistoryByCusIdToTable();
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
  </body>
</html>
