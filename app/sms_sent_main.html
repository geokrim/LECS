  <script>
    credsAppOtherCheck();
    if (typeof menu_constructor === "function") menu_constructor();

    document.addEventListener("click", function (e) {
      var link = e.target.closest(".br-menu-link");
      if (!link) return;
      var sub = link.nextElementSibling;
      if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
        e.preventDefault();
        link.classList.toggle("show-sub");
        return;
      }
    });

    (function () {
      try {
        var raw = localStorage.getItem("lcObj");
        if (!raw) return;
        var u = JSON.parse(raw);
        var name = (u && (u.name || u.username) ? String(u.name || u.username) : "").trim();
        var surname = (u && u.surname ? String(u.surname) : "").trim();
        var full = (name + (surname ? " " + surname : "")).trim();
        if (!full) return;
        var el = document.getElementById("lc_user_name");
        if (el) el.textContent = full;
      } catch (e) {}
    })();

    try {
      document.getElementById("lcSmsMenu").classList.add("active");
      document.getElementById("lcSmsMenu").classList.add("show-sub");
      document.getElementById("lcSmsSent").classList.add("active");
    } catch (e) {}

    var current_sms_sent_id = 0;
    current_sms_sent_id = smsSentGetId();
    showSmsSentById(current_sms_sent_id);

    $(function () {
      "use strict";
      $(window).resize(function () {
        minimizeMenu();
      });

      minimizeMenu();

      function minimizeMenu() {
        if (window.matchMedia("(min-width: 992px)").matches && window.matchMedia("(max-width: 1299px)").matches) {
          $(".menu-item-label,.menu-item-arrow").addClass("op-lg-0-force d-lg-none");
          $("body").addClass("collapsed-menu");
          $(".show-sub + .br-menu-sub").slideUp();
        } else if (window.matchMedia("(min-width: 1300px)").matches && !$("body").hasClass("collapsed-menu")) {
          $(".menu-item-label,.menu-item-arrow").removeClass("op-lg-0-force d-lg-none");
          $("body").removeClass("collapsed-menu");
          $(".show-sub + .br-menu-sub").slideDown();
        }
      }
    });
  </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
