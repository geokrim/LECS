    <!-- jQuery UI Autocomplete Styling -->
    <style>
      .ui-autocomplete {
        background: rgba(17, 24, 39, 0.98) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 12px !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
        max-height: 300px;
        overflow-y: auto;
        z-index: 9999 !important;
      }
      .ui-autocomplete .ui-menu-item {
        padding: 0;
      }
      .ui-autocomplete .ui-menu-item-wrapper {
        padding: 12px 16px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        cursor: pointer;
        border-radius: 0;
      }
      .ui-autocomplete .ui-menu-item:first-child .ui-menu-item-wrapper {
        border-radius: 12px 12px 0 0;
      }
      .ui-autocomplete .ui-menu-item:last-child .ui-menu-item-wrapper {
        border-radius: 0 0 12px 12px;
      }
      .ui-autocomplete .ui-state-active,
      .ui-autocomplete .ui-state-focus {
        background: rgba(246, 211, 45, 0.2) !important;
        border: none !important;
        color: #fff !important;
      }

      /* Empty table styling */
      #cusVafeio,
      #cusHistoryTableSales {
        position: relative;
      }

      #cusVafeio tbody:empty,
      #cusHistoryTableSales tbody:empty {
        display: table-row-group !important;
        height: 150px;
      }

      #cusVafeio tbody:empty::before,
      #cusHistoryTableSales tbody:empty::before {
        content: "Δεν υπάρχουν εγγραφές για αυτόν τον πελάτη";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        font-style: italic;
        white-space: nowrap;
      }

      /* Align tables and form inputs */
      .content-card {
        max-width: 1100px !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }

      .table-shell {
        width: 100% !important;
        overflow-x: auto;
      }

      #cusVafeio,
      #cusHistoryTableSales {
        width: 100% !important;
        margin: 0 !important;
      }

      /* Form layout consistency */
      .form-layout {
        width: 100% !important;
        max-width: none !important;
      }

      /* Input field consistency */
      .form-group input[type="text"],
      .form-group textarea {
        width: 100% !important;
        box-sizing: border-box !important;
      }

      /* Remove fixed widths from cols */
      .col-sm-3,
      .col-sm-9 {
        max-width: none !important;
        flex: 1 1 auto !important;
      }

      .col-sm-3 {
        flex: 0 0 25% !important;
        max-width: 25% !important;
      }

      .col-sm-9 {
        flex: 0 0 75% !important;
        max-width: 75% !important;
      }

      /* Customer select input styling */
      #select_cus {
        width: 380px !important;
        height: 52px !important;
        padding: 12px 16px !important;
        font-size: 15px !important;
        font-weight: 500 !important;
        color: rgba(255, 255, 255, 0.95) !important;
        background: rgba(17, 24, 39, 0.85) !important;
        border: 2px solid rgba(246, 211, 45, 0.35) !important;
        border-radius: 14px !important;
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06) !important;
        transition: all 0.2s ease !important;
      }

      #select_cus::placeholder {
        color: rgba(255, 255, 255, 0.45) !important;
      }

      #select_cus:hover {
        border-color: rgba(246, 211, 45, 0.55) !important;
        background: rgba(17, 24, 39, 0.95) !important;
      }

      #select_cus:focus {
        outline: none !important;
        border-color: rgba(246, 211, 45, 0.85) !important;
        box-shadow:
          0 0 0 4px rgba(246, 211, 45, 0.15),
          0 14px 36px rgba(0, 0, 0, 0.55) !important;
        background: rgba(17, 24, 39, 1) !important;
      }
    </style>

        <!-- Customer Selection -->
        <div class="content-card" style="margin-bottom: 20px">

            <div class="form-layout">
              <div class="row">
                <div class="col-12">

                    <button
                      id="btn_cus_history"

                      class="btn"

                      Ιστορικό

                  </div>
                </div>
              </div>

          </div>

        <!-- Customer Details Collapse -->
        <div class="collapse multi-collapse" id="multiCollapseExample1">
          <div class="content-card" style="margin-bottom: 20px">
            <div class="content-card__body">
              <div class="form-layout">
                <div class="row" style="display: none">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_id">ID:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_id"
                        disabled
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_name">Όνομα:</label>
                      <input type="text" class="form-control" id="cus_name" />
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_surname">Επώνυμο:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_surname"
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label class="ckbox ckbox-success"
                        ><input type="checkbox" id="cus_active" /><span
                          >Ενεργός</span
                        ></label
                      >
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="dob_datepicker">Γεννέθλια:</label>
                      <input
                        type="text"
                        class="form-control fc-datepicker"
                        id="dob_datepicker"
                        placeholder="DD/MM/YYYY"
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label class="ckbox ckbox-indigo"
                        ><input
                          type="checkbox"
                          id="cus_is_female"
                          value="F"
                          onclick="clickCusSexFemale()"
                        /><span>ΓΥΝΑΙΚΑ</span></label
                      >
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label class="ckbox ckbox-primary"
                        ><input
                          type="checkbox"
                          id="cus_is_male"
                          value="M"
                          onclick="clickCusSexMale()"
                        /><span>ΑΝΔΡΑΣ</span></label
                      >
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label class="ckbox ckbox-success"
                        ><input
                          type="checkbox"
                          id="cus_gdpr"
                          onclick="clickCusGdpr()"
                        /><span>GDPR</span></label
                      >
                      <input
                        type="text"
                        class="form-control fc-datepicker"
                        id="cus_gdpr_datepicker"
                        placeholder="DD/MM/YYYY"
                        disabled
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_mobile">Κινητό:</label>
                      <input type="text" class="form-control" id="cus_mobile" />
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_phone">Σταθερό:</label>
                      <input type="text" class="form-control" id="cus_phone" />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_email">Email:</label>
                      <input type="text" class="form-control" id="cus_email" />
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_address">Διεύθυνση:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_address"
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_disc_service">Έκπτωση Υπηρ/ών:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_disc_service"
                        style="direction: rtl"
                      />
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_disc_stock">Έκπτωση Προιόντα:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_disc_stock"
                        style="direction: rtl"
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="cus_days_from_last">Ημ. τελ. Επισ/ψη:</label>
                      <input
                        type="text"
                        class="form-control"
                        id="cus_days_from_last"
                        style="direction: rtl"
                        disabled
                      />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-12">
                    <div class="form-group">
                      <label for="cus_comments">Σχόλια:</label>
                      <textarea
                        rows="3"
                        class="form-control"
                        placeholder="Σχόλια"
                        id="cus_comments"
                      ></textarea>
                    </div>
                  </div>
                </div>

                <div class="form-layout-footer">
                  <button
                    class="btn btn-primary"
                    id="cus_update"
                    onclick="execUpdateCusByIdFromCus(3)"
                  >
                    Αποθήκευση
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

                  </div>
                </div>
              </div>
              <div class="form-layout-footer">
                <button
                  class="btn btn-primary"
                  id="last_cus_vafi"

                <button

          <div class="content-card__body">
            <div class="table-shell">
              <table

                <thead>
                  <tr>
                    <th>Id</th>

                <tbody></tbody>
              </table>

        <!-- Edit Modal -->
        <div id="vafeioVaFiMainModal" class="modal fade">
          <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h6
                  style="
                    margin: 0;
                    font-size: 14px;
                    font-weight: 700;
                    text-transform: uppercase;
                    color: rgba(255, 255, 255, 0.92);
                  "
                >
                  ΒΑΦΕΙΟ
                </h6>
                <button
                  type="button"
                  class="close"
                  data-dismiss="modal"
                  aria-label="Close"
                >
                  <span aria-hidden="true">&times;</span>
                </button>
              </div>
              <div class="modal-body">
                <div id="vafeio_vafi_update_group">
                  <input
                    type="hidden"
                    id="vafeio_vafi_update_id"
                    name="vafeio_vafi_update_id"
                  />
                  <div class="form-group">
                    <input
                      type="text"
                      class="form-control fc-datepicker"
                      id="vafeio_vafi_update_datepicker"
                      placeholder="DD/MM/YYYY"
                    />
                  </div>
                  <div class="form-group">
                    <textarea
                      id="vafeio_vafi_update_descr"
                      name="vafeio_vafi_update_descr"
                      rows="3"
                      class="form-control"
                    ></textarea>
                  </div>
                  <div class="vafi-buttons">
                    <button
                      onclick="vafeioVafiUpdate()"
                      type="button"
                      class="btn btn-primary"
                    >
                      Αποθήκευση
                    </button>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn" data-dismiss="modal">
                  Κλείσιμο
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Delete Modal -->
        <div class="modal fade" id="vafeio_vafi_delete_modal">
          <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <h6
                  id="vafeio_delete_error_message"
                  style="
                    margin: 0;
                    font-size: 14px;
                    font-weight: 700;
                    text-transform: uppercase;
                    color: rgba(255, 255, 255, 0.92);

                  ΕΠΙΒΕΒΑΙΩΣΗ ΔΙΑΓΡΑΦΗΣ

                  style="
                    margin: 0;
                    font-size: 16px;
                    font-weight: 500;
                    color: rgba(255, 255, 255, 0.92);

              </div>
              <div class="modal-footer">
                <button
                  id="btn_cus_delete"
                  onclick="vafeio_vafi_delete()"

                  type="button"
                  class="btn btn-danger"

                  Διαγραφή
                </button>
                <button type="button" class="btn" data-dismiss="modal">
                  Ακύρωση
                </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>

    <script>
      credsAppOtherCheck();

      if (typeof menu_constructor === "function") menu_constructor();

      document.addEventListener("click", function (e) {
        var link = e.target.closest(".br-menu-link");
        if (!link) return;

        var sub = link.nextElementSibling;
        if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
          e.preventDefault();
          link.classList.toggle("show-sub");
          return;
        }
      });

      (function () {
        try {
          var raw = localStorage.getItem("lcObj");
          if (!raw) return;
          var u = JSON.parse(raw);
          var name = (
            u && (u.name || u.username) ? String(u.name || u.username) : ""
          ).trim();
          var surname = (u && u.surname ? String(u.surname) : "").trim();
          var full = (name + (surname ? " " + surname : "")).trim();
          if (!full) return;
          var el = document.getElementById("lc_user_name");
          if (el) el.textContent = full;
        } catch (e) {}
      })();

      try {
        document.getElementById("lcCusMenu").classList.add("active");
        document.getElementById("lcCusMenu").classList.add("show-sub");
        document.getElementById("lcVafeio").classList.add("active");
      } catch (e) {}

      if (typeof seeCusDetails !== "undefined" && seeCusDetails == 0) {
        document.getElementById("btn_cus_details").style.visibility = "hidden";
      }
      if (typeof seeCusHistory !== "undefined" && seeCusHistory == 0) {
        document.getElementById("btn_cus_history").style.visibility = "hidden";
      }

      $(".fc-datepicker").datepicker({
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
      });

      // Initialize the page
      var availableCustomers = [];
      add_cus_to_selection();
      initializeDates();
      initialize_fields();
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
  </body>
