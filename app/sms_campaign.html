            <div class="form-layout sms-form">
              <div class="row">
                <div class="col-12">

                    <label class="ckbox ckbox-success"

                    >

                      class="form-control inputfield-150"
                      type="text"
                      id="first_name"
                      name="first_name"

                    />
                  </div>

              </div>

              <div class="row">
                <div class="col-12">
                  <div class="sms-filter-row">
                    <label class="ckbox ckbox-success"

                        id="sms_fltr_dob"

                    <input

                      class="form-control fc-datepicker sms-dtpicker"
                      id="dt_datepicker_dob_to"
                      placeholder="DD/MM/YYYY"
                      disabled
                    />

                </div>
              </div>

              <div class="row">
                <div class="col-12">
                  <div class="sms-filter-row">
                    <label class="ckbox ckbox-success"
                      ><input

                    >
                    <label>Απο:</label>
                    <input
                      type="text"
                      class="form-control inputfield-150"
                      id="last_visit_from"
                      name="last_visit_from"

                    <label>Εως:</label>

                      type="text"
                      class="form-control inputfield-150"
                      id="last_visit_to"

              <div class="row">

                    <label class="ckbox ckbox-success"
                      ><input
                        type="checkbox"

                        onclick="fltr_tziros_toggle()"
                      /><span>Φίλτο 4 ΤΖΙΡΟΣ:</span></label
                    >
                    <label>Απο:</label>
                    <input
                      type="text"
                      class="form-control fc-datepicker sms-dtpicker"
                      id="dt_datepicker_tziros_from"
                      placeholder="DD/MM/YYYY"
                      disabled
                    />
                    <label>Εως:</label>
                    <input
                      type="text"
                      class="form-control fc-datepicker sms-dtpicker"
                      id="dt_datepicker_tziros_to"
                      placeholder="DD/MM/YYYY"
                      disabled
                    />
                    <label>Απο:</label>
                    <input
                      type="text"
                      class="form-control inputfield-150"
                      id="tziros_amount_from"
                      name="tziros_amount_from"

                    <label>Εως:</label>

                      type="text"
                      class="form-control inputfield-150"
                      id="tziros_amount_to"
                      name="tziros_amount_to"
                      disabled
                    />
                  </div>

              </div>

                      ><input
                        type="checkbox"
                        id="sms_fltr_max_rows"

                    >
                    <input
                      type="text"
                      class="form-control inputfield-150"
                      id="max_rows"
                      name="max_rows"
                      disabled
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-12">
                  <div class="sms-filter-row">
                    <label class="ckbox ckbox-success"
                      ><input
                        type="checkbox"
                        id="sms_fltr_order_by"
                        onclick="fltr_order_by_toggle()"

                    <select
                      id="select_order_by"

                    </select>
                    <label>Σειρά:</label>

                      id="select_order_by_desc_asc"
                      class="gasoum-selector"
                    >
                      <option value="asc">Μικρότερο προς μεταγαλύτερο</option>
                      <option value="desc">Μεγαλύτερο προς μικρότερο</option>

    <script>
      credsAppOtherCheck();

      if (typeof menu_constructor === "function") menu_constructor();

      document.addEventListener("click", function (e) {
        var link = e.target.closest(".br-menu-link");
        if (!link) return;

        var sub = link.nextElementSibling;
        if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
          e.preventDefault();
          link.classList.toggle("show-sub");
          return;
        }
      });

      (function () {
        try {
          var raw = localStorage.getItem("lcObj");
          if (!raw) return;
          var u = JSON.parse(raw);
          var name = (
            u && (u.name || u.username) ? String(u.name || u.username) : ""
          ).trim();
          var surname = (u && u.surname ? String(u.surname) : "").trim();
          var full = (name + (surname ? " " + surname : "")).trim();
          if (!full) return;
          var el = document.getElementById("lc_user_name");
          if (el) el.textContent = full;
        } catch (e) {}
      })();

      try {
        document.getElementById("lcSmsMenu").classList.add("active");
        document.getElementById("lcSmsMenu").classList.add("show-sub");
        document.getElementById("lcSmsCampaign").classList.add("active");
      } catch (e) {}

      initilizeFilters();
      executeSmsKeimenaToSelection();

      $(".fc-datepicker").datepicker({
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
      });

      $("#ui-datepicker-div").hide();

      $("#sms_keimena_txt").keyup(function () {
        var sms_txt_len = document.getElementById("sms_keimena_txt").value;

        if (sms_txt_len.length >= 160) {
          let only160Txt = document.getElementById("sms_keimena_txt").value;

          only160Txt = only160Txt.substring(0, 160);
          document.getElementById("sms_keimena_txt").value = only160Txt;
        }

        document.getElementById("sms_keimena_txt_len").innerHTML =
          sms_txt_len.length;
      });

      $(function () {
        "use strict";

        $(window).resize(function () {
          minimizeMenu();
        });

        minimizeMenu();

        function minimizeMenu() {
          if (
            window.matchMedia("(min-width: 992px)").matches &&
            window.matchMedia("(max-width: 1299px)").matches
          ) {
            $(".menu-item-label,.menu-item-arrow").addClass(
              "op-lg-0-force d-lg-none"
            );
            $("body").addClass("collapsed-menu");
            $(".show-sub + .br-menu-sub").slideUp();
          } else if (
            window.matchMedia("(min-width: 1300px)").matches &&
            !$("body").hasClass("collapsed-menu")
          ) {
            $(".menu-item-label,.menu-item-arrow").removeClass(
              "op-lg-0-force d-lg-none"
            );
            $("body").removeClass("collapsed-menu");
            $(".show-sub + .br-menu-sub").slideDown();
          }
        }
      });

      $("#datatable2").DataTable({
        responsive: true,
        stateSave: true,
        dom: "Bfrtip",
        buttons: ["copy", "excel", "pdf", "print"],
        language: {
          searchPlaceholder: "Search...",
          sSearch: "",
          lengthMenu: "_MENU_ items/page",
        },
      });

      if (seeExport == 0) {
        tblDT = $("#datatable2").DataTable();
        tblDT.button(0).enable(false);
        tblDT.button(1).enable(false);
        tblDT.button(2).enable(false);
        tblDT.button(3).enable(false);
      }
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
