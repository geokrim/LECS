      .ckbox {
        display: inline-flex;

        font-size: 13px;

        <div class="content-card">

            <div class="form-layout">

                    <label for="stck_id">Id:</label>

                      type="text"

                      id="stck_id"
                      name="stck_id"

                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="stck_code">Κωδικός:</label>
                    <input
                      type="text"
                      class="form-control"
                      id="stck_code"
                      name="stck_code"
                    />
                  </div>
                </div>
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="stck_barcode">Barcode:</label>
                    <input
                      type="text"
                      class="form-control"
                      id="stck_barcode"
                      name="stck_barcode"
                    />
                  </div>

              </div>

              <div class="row">
                <div class="col-sm-12">
                  <div class="form-group">
                    <label for="stck_descr">Περιγραφή:</label>

                      type="text"

              <div class="row">
                <div class="col-sm-12">
                  <div class="form-group">
                    <label for="stck_comments">Σχόλια:</label>
                    <textarea
                      class="form-control"

              <div class="row">
                <div class="col-sm-6">

                      id="stck_categ"

                  </div>
                </div>
                <div class="col-sm-6">

                    <label for="stck_esex_categ">Κατηγορία Εσόδων Ταμείου:</label>

              <div class="row">

                  <div class="form-group">

                      type="text"
                      class="form-control"
                      id="buy_price"
                      name="buy_price"
                      style="direction: rtl"
                    />

                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="stck_price">Τιμή Πώλησης:</label>
                    <input
                      type="text"
                      class="form-control"
                      id="stck_price"
                      name="stck_price"
                      style="direction: rtl"
                    />
                  </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="stck_stock">Απόθεμα:</label>

                      type="text"
                      class="form-control"
                      id="stck_stock"
                      name="stck_stock"
                      style="direction: rtl"
                    />
                  </div>
                </div>
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="stck_min_stock">Ελάχιστο Απόθεμα:</label>
                    <input
                      type="text"
                      class="form-control"
                      id="stck_min_stock"
                      name="stck_min_stock"
                      style="direction: rtl"
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <div style="display: flex; gap: 30px; margin-top: 8px;">
                      <label class="ckbox ckbox-success"
                        ><input type="checkbox" id="stck_active" checked /><span>Ενεργό</span></label
                      >
                      <label class="ckbox ckbox-success"
                        ><input type="checkbox" id="stck_for_web" /><span>Για το internet</span></label
                      >
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-layout-footer">
                <button
                  class="btn btn-primary"
                  id="stck_update"
                  onclick="checkIfBarcodeExistsBeforeInsert()"

                  Αποθήκευση

    <div id="progress_line" style="visibility: hidden"></div>

    <script src="../lib/jquery/jquery.js"></script>
    <script src="https://code.jquery.com/ui/1.11.4/jquery-ui.js"></script>
    <link
      rel="stylesheet"
      href="https://code.jquery.com/ui/1.11.4/themes/smoothness/jquery-ui.css"
    />
    <script src="../lib/popper.js/popper.js"></script>
    <script src="../lib/bootstrap/bootstrap.js"></script>
    <script src="../lib/jquery-ui/jquery-ui.js"></script>

    <script>
      credsAppOtherCheck();

      if (typeof menu_constructor === "function") menu_constructor();

      document.addEventListener("click", function (e) {
        var link = e.target.closest(".br-menu-link");
        if (!link) return;

        var sub = link.nextElementSibling;
        if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
          e.preventDefault();
          link.classList.toggle("show-sub");
          return;
        }
      });

      (function () {
        try {
          var raw = localStorage.getItem("lcObj");
          if (!raw) return;
          var u = JSON.parse(raw);
          var name = (
            u && (u.name || u.username) ? String(u.name || u.username) : ""
          ).trim();
          var surname = (u && u.surname ? String(u.surname) : "").trim();
          var full = (name + (surname ? " " + surname : "")).trim();
          if (!full) return;
          var el = document.getElementById("lc_user_name");
          if (el) el.textContent = full;
        } catch (e) {}
      })();

      try {
        document.getElementById("lcStockMenu").classList.add("active");
        document.getElementById("lcStockMenu").classList.add("show-sub");
        document.getElementById("lcStock").classList.add("active");
      } catch (e) {}

      showStckCategForInsert();
      showStckEsexCategForInsert();
      insertNewStckInitialize();

      $(".fc-datepicker").datepicker({
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
