    <script>
      credsAppOtherCheck();
      if (typeof menu_constructor === "function") {
        menu_constructor();
      }

      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
            menuToggle.addEventListener("click", function () {
                body.classList.toggle("collapsed-menu");
            });
        }

        if (mobileMenuToggle) {
            mobileMenuToggle.addEventListener("click", function (e) {
                e.stopPropagation();
                body.classList.add("show-sidebar");
            });
        }

        if (sidebarOverlay) {
            sidebarOverlay.addEventListener("click", function () {
                body.classList.remove("show-sidebar");
            });
        }

        document.addEventListener("click", function (e) {
            var link = e.target.closest(".br-menu-link");
            if (!link) return;
            var sub = link.nextElementSibling;
            if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
                e.preventDefault();
                link.classList.toggle("show-sub");
                return;
            }
            if (window.innerWidth < 981) {
                body.classList.remove("show-sidebar");
            }
        });
    });

    (function () {
        try {
            var raw = localStorage.getItem("lcObj");
            if (!raw) return;
            var u = JSON.parse(raw);
            var name = (u && (u.name || u.username) ? String(u.name || u.username) : "").trim();
            var surname = (u && u.surname ? String(u.surname) : "").trim();
            var full = (name + (surname ? " " + surname : "")).trim();
            if (!full) return;
            var el = document.getElementById("lc_user_name");
            if (el) el.textContent = full;
        } catch (e) {
            console.error("Error loading user bar:", e);
        }
    })();

    try {
        var companyEl = document.getElementById("lcCompany");
        var settingsMenu = document.getElementById("lcSettingsMenu");
        
        if (companyEl) companyEl.classList.add("active");
        if (settingsMenu) {
            settingsMenu.classList.add("active");
            settingsMenu.classList.add("show-sub");
        }
    } catch (e) {
        console.warn("Menu state error:", e);
    }

    if (window.jQuery) {
        jQuery(function () {
            if (typeof showCompanyById === "function") {
                showCompanyById();
            }
        });
    }
