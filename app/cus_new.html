        <div class="content-card">
          <div class="content-card__body">
            <div class="form-layout">
              <div class="row hidden">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="cus_id">Κωδικός:</label>
                    <input
                      class="form-control"
                      type="text"
                      id="cus_id"
                      name="cus_id"
                      disabled
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label class="ckbox ckbox-success"
                      ><input type="checkbox" id="cus_active" /><span
                        >Ενεργός</span
                      ></label
                    >
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="cus_name">Όνομα:</label>
                    <input
                      class="form-control"
                      type="text"
                      id="cus_name"
                      name="cus_name"
                    />
                  </div>
                </div>
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="cus_surname">Επώνυμο:</label>
                    <input
                      class="form-control"
                      type="text"
                      id="cus_surname"
                      name="cus_surname"
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-4">
                  <div class="form-group">
                    <label for="dob_datepicker">Γεννέθλια:</label>
                    <input
                      type="text"
                      class="form-control fc-datepicker"
                      id="dob_datepicker"
                      placeholder="DD/MM/YYYY"
                    />
                  </div>
                </div>
                <div class="col-sm-4">
                  <div class="form-group">
                    <label class="ckbox ckbox-success"
                      ><input
                        type="checkbox"
                        id="cus_is_female"
                        value="F"
                        onclick="clickCusSexFemale()"
                      /><span>ΓΥΝΑΙΚΑ</span></label
                    >
                  </div>
                </div>
                <div class="col-sm-4">
                  <div class="form-group">
                    <label class="ckbox ckbox-success"
                      ><input
                        type="checkbox"
                        id="cus_is_male"
                        value="M"
                        onclick="clickCusSexMale()"
                      /><span>ΑΝΔΡΑΣ</span></label
                    >
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label class="ckbox ckbox-success"
                      ><input
                        type="checkbox"
                        id="cus_gdpr"
                        onclick="clickCusGdpr()"
                      /><span>GDPR</span></label
                    >
                    <input
                      type="text"
                      class="form-control fc-datepicker"
                      id="cus_gdpr_datepicker"
                      placeholder="DD/MM/YYYY"
                      disabled
                    />
                  </div>
                </div>
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="cus_days_from_last">Ημ. τελ. Επισ/ψη:</label>

                      class="form-control"
                      type="text"
                      id="cus_days_from_last"
                      name="cus_days_from_last"
                      disabled
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-sm-6">
                  <div class="form-group">
                    <label for="cus_mobile">Κινητό:</label>
                    <input

                      type="text"
                      id="cus_mobile"
                      name="cus_mobile"
                    />
                  </div>
                </div>
                <div class="col-sm-6">

                      type="text"

              <div class="row">

                      type="text"

                <div class="col-sm-6">

                    <label for="cus_disc_stock">Έκπτωση Προιόντα:</label>

              <div class="row">

                    <textarea
                      rows="3"
                      class="form-control"
                      placeholder="Σχόλια"
                      id="cus_comments"
                    ></textarea>
                  </div>
                </div>
              </div>

              <div class="form-layout-footer">

                  type="button"
                  class="btn btn-primary"
                  id="cus_update"

    <script>
      credsAppOtherCheck();

      if (typeof menu_constructor === "function") menu_constructor();

      document.addEventListener("click", function (e) {
        var link = e.target.closest(".br-menu-link");
        if (!link) return;

        var sub = link.nextElementSibling;
        if (sub && sub.classList && sub.classList.contains("br-menu-sub")) {
          e.preventDefault();
          link.classList.toggle("show-sub");
          return;
        }
      });

      (function () {
        try {
          var raw = localStorage.getItem("lcObj");
          if (!raw) return;
          var u = JSON.parse(raw);
          var name = (
            u && (u.name || u.username) ? String(u.name || u.username) : ""
          ).trim();
          var surname = (u && u.surname ? String(u.surname) : "").trim();
          var full = (name + (surname ? " " + surname : "")).trim();
          if (!full) return;
          var el = document.getElementById("lc_user_name");
          if (el) el.textContent = full;
        } catch (e) {}
      })();

      try {
        document.getElementById("lcCusMenu").classList.add("active");
        document.getElementById("lcCusMenu").classList.add("show-sub");
        document.getElementById("lcCusSubNew").classList.add("active");
      } catch (e) {}

      cusNewInitialize();

      $(".fc-datepicker").datepicker({
        showOtherMonths: true,
        selectOtherMonths: true,
        dateFormat: "dd/mm/yy",
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const menuToggle = document.getElementById("menuToggle");
        const mobileMenuToggle = document.getElementById("mobileMenuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const body = document.body;

        if (menuToggle) {
          menuToggle.addEventListener("click", function () {
            body.classList.toggle("collapsed-menu");
          });
        }

        if (mobileMenuToggle) {
          mobileMenuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            body.classList.add("show-sidebar");
          });
        }

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", function () {
            body.classList.remove("show-sidebar");
          });
        }
      });
    </script>
